name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl,      suffix: linux-amd64 }
          - { target: i686-unknown-linux-musl,        suffix: linux-386 }
          - { target: aarch64-unknown-linux-musl,     suffix: linux-arm64 }
          - { target: armv7-unknown-linux-musleabihf, suffix: linux-armv7 }
          - { target: arm-unknown-linux-musleabihf,   suffix: linux-armv6 }
          - { target: riscv64gc-unknown-linux-musl,   suffix: linux-riscv64 }
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Add target (for musl startup objects; tier-3 targets fall back to build-std)
        run: rustup target add "${{ matrix.target }}" || true

      # rustc puts -Wl,--fix-cortex-a53-843419 in aarch64's pre_link_args, but
      # `zig cc` rejects it as an unsupported linker arg. Forward zig through a
      # shim that drops the flag; harmless on every other target.
      - name: Install zig shim
        run: |
          set -euo pipefail
          echo "REAL_ZIG=$(command -v zig)" >> "$GITHUB_ENV"
          shim="$RUNNER_TEMP/zig"
          cat > "$shim" <<'SHIM'
          #!/usr/bin/env bash
          args=()
          for a in "$@"; do
            case "$a" in
              -Wl,--fix-cortex-a53-843419|--fix-cortex-a53-843419) ;;
              *) args+=("$a") ;;
            esac
          done
          exec "$REAL_ZIG" "${args[@]}"
          SHIM
          chmod +x "$shim"
          echo "CARGO_ZIGBUILD_ZIG_PATH=$shim" >> "$GITHUB_ENV"

      - name: Build static binary
        env:
          RUSTFLAGS: "-Zlocation-detail=none -Zfmt-debug=none -Zunstable-options -Cpanic=immediate-abort -Cforce-unwind-tables=no --cfg curve25519_dalek_backend=\"serial\""
        run: |
          set -euo pipefail
          cargo zigbuild --release -p newt --target "${{ matrix.target }}"
          mkdir -p out
          install -Dm755 "target/${{ matrix.target }}/release/newt" \
            "out/newt-${GITHUB_REF_NAME}-${{ matrix.suffix }}"
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.suffix }}
          path: out/*
          if-no-files-found: error
          retention-days: 7

  # mips (Teltonika routers etc.): tier-3 targets built via build-std, ring-free
  # (de-ringed boringtun + rustls-rustcrypto). Separate + continue-on-error so a
  # build-std hiccup never blocks the mainstream release.
  mips:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # mips (AR9xxx Teltonikas), mipsel (MediaTek). cross provides the
          # soft-float musl toolchain via its ghcr image (reachable from Actions,
          # unlike musl.cc); build-std is configured in Cross.toml.
          - { target: mips-unknown-linux-musl,   suffix: linux-mips }
          - { target: mipsel-unknown-linux-musl, suffix: linux-mipsel }
    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5

      - name: Build static binary (cross + build-std)
        env:
          RUSTFLAGS: "-Zlocation-detail=none -Zfmt-debug=none -Zunstable-options -Cpanic=immediate-abort -Cforce-unwind-tables=no --cfg curve25519_dalek_backend=\"serial\" -Ctarget-feature=+crt-static -Clink-self-contained=no"
        run: |
          set -euo pipefail
          cross build --release -p newt --target "${{ matrix.target }}"
          mkdir -p out
          install -Dm755 "target/${{ matrix.target }}/release/newt" \
            "out/newt-${GITHUB_REF_NAME}-${{ matrix.suffix }}"

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.suffix }}
          path: out/*
          if-no-files-found: error
          retention-days: 7

  # Best-effort native FreeBSD build in a VM (zig cannot cross-compile FreeBSD libc).
  # continue-on-error so a FreeBSD failure never blocks the Linux release.
  freebsd:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          envs: "GITHUB_REF_NAME"
          prepare: |
            pkg install -y curl
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain nightly --component rust-src
          run: |
            . "$HOME/.cargo/env"
            export RUSTFLAGS='-Zlocation-detail=none -Zfmt-debug=none -Zunstable-options -Cpanic=immediate-abort -Cforce-unwind-tables=no --cfg curve25519_dalek_backend="serial"'
            cargo build --release -p newt --target x86_64-unknown-freebsd
            mkdir -p out
            install -m 755 "target/x86_64-unknown-freebsd/release/newt" \
              "out/newt-${GITHUB_REF_NAME}-freebsd-amd64"

      - uses: actions/upload-artifact@v4
        with:
          name: bin-freebsd-amd64
          path: out/*
          if-no-files-found: error
          retention-days: 7

  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/newt-rust
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bin-*
          merge-multiple: true

      - name: Stage binaries per platform
        run: |
          set -euo pipefail
          T="${GITHUB_REF_NAME}"
          install -Dm755 "artifacts/newt-${T}-linux-amd64"   bin/linux/amd64/newt
          install -Dm755 "artifacts/newt-${T}-linux-386"     bin/linux/386/newt
          install -Dm755 "artifacts/newt-${T}-linux-arm64"   bin/linux/arm64/newt
          install -Dm755 "artifacts/newt-${T}-linux-armv7"   bin/linux/arm/v7/newt
          install -Dm755 "artifacts/newt-${T}-linux-armv6"   bin/linux/arm/v6/newt
          install -Dm755 "artifacts/newt-${T}-linux-riscv64" bin/linux/riscv64/newt

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: "false"
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7,linux/arm/v6,linux/riscv64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest

  release:
    needs: [build, docker, freebsd, mips]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: out
          pattern: bin-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: out
        run: sha256sum * | tee SHA256SUMS

      - name: Create release
        working-directory: out
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/newt-rust"
          cat > ../NOTES.md <<EOF
          Static Linux musl binaries (amd64, 386, arm64, armv7, armv6, riscv64) plus a
          FreeBSD amd64 build, size-optimized (\`build-std\`, immediate-abort panics).

          \`\`\`
          docker pull ${IMAGE}:${TAG}
          \`\`\`

          Verify downloads against \`SHA256SUMS\`.
          EOF
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes-file ../NOTES.md *
