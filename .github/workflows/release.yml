name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl,      suffix: linux-amd64 }
          - { target: aarch64-unknown-linux-musl,     suffix: linux-arm64 }
          - { target: armv7-unknown-linux-musleabihf, suffix: linux-armv7 }
          - { target: riscv64gc-unknown-linux-musl,   suffix: linux-riscv64 }
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build static binary
        env:
          RUSTFLAGS: "-Zlocation-detail=none -Zfmt-debug=none -Zunstable-options -Cpanic=immediate-abort"
        run: |
          set -euo pipefail
          cargo zigbuild --release -p newt --target "${{ matrix.target }}"
          mkdir -p out
          install -Dm755 "target/${{ matrix.target }}/release/newt" \
            "out/newt-${GITHUB_REF_NAME}-${{ matrix.suffix }}"
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.suffix }}
          path: out/*
          if-no-files-found: error
          retention-days: 7

  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/newt-rust
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bin-*
          merge-multiple: true

      - name: Stage binaries per platform
        run: |
          set -euo pipefail
          T="${GITHUB_REF_NAME}"
          install -Dm755 "artifacts/newt-${T}-linux-amd64" bin/linux/amd64/newt
          install -Dm755 "artifacts/newt-${T}-linux-arm64" bin/linux/arm64/newt
          install -Dm755 "artifacts/newt-${T}-linux-armv7" bin/linux/arm/v7/newt

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: "false"
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest

  release:
    needs: [build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: out
          pattern: bin-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: out
        run: sha256sum * | tee SHA256SUMS

      - name: Create release
        working-directory: out
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/newt-rust"
          cat > ../NOTES.md <<EOF
          Static musl binaries, size-optimized (\`build-std\`, immediate-abort panics).

          \`\`\`
          docker pull ${IMAGE}:${TAG}
          \`\`\`

          Verify downloads against \`SHA256SUMS\`.
          EOF
          gh release create "$TAG" --title "$TAG" --notes-file ../NOTES.md *
